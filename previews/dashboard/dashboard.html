<div class="dashboard-panel">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="sidebar-logo">
      <i class="fa-solid fa-bolt"></i>
    </div>

    <nav class="sidebar-nav">

      <a href="#" class="nav-link active">
        <i class="fa-solid fa-house"></i>
        Dashboard
      </a>

      <a href="#" class="nav-link">
        <i class="fa-solid fa-chart-line"></i>
        Analytics
      </a>

      <a href="#" class="nav-link">
        <i class="fa-solid fa-folder"></i>
        Projects
      </a>

      <a href="#" class="nav-link">
        <i class="fa-solid fa-users"></i>
        Team
      </a>

      <a href="#" class="nav-link">
        <i class="fa-solid fa-gear"></i>
        Settings
      </a>

    </nav>

    <div class="sidebar-user">

      <div class="avatar">
        <i class="fa-solid fa-user"></i>
      </div>

      <div>
        <h4>John Doe</h4>
        <span>Admin</span>
      </div>

    </div>

  </aside>

  <!-- MAIN -->

  <main class="content">

    <!-- KPI CARDS -->

    <section class="stats-grid">
      <article class="stat-card">
        <span class="stat-label">Total Users</span>
        <div class="stat-value">2,543</div>
        <span class="stat-change positive">+12.5%</span>
      </article>

      <article class="stat-card">
        <span class="stat-label">Revenue</span>
        <div class="stat-value">$24,780</div>
        <span class="stat-change positive">+8.2%</span>
      </article>

      <article class="stat-card">
        <span class="stat-label">Orders</span>
        <div class="stat-value">1,458</div>
        <span class="stat-change positive">+5.1%</span>
      </article>

      <article class="stat-card">
        <span class="stat-label">Bounce Rate</span>
        <div class="stat-value">24.6%</div>
        <span class="stat-change positive">-3.4%</span>
      </article>

    </section>

    <!-- CHARTS -->

    <section class="dashboard-grid">

      <article class="chart-card">

        <h3>Sales Overview</h3>

        <canvas id="salesChart"></canvas>

      </article>

      <article class="countries-card">

        <h3>Top Countries</h3>

        <div class="country">
          <span>United States</span>
          <span>42%</span>
        </div>

        <div class="progress">
          <span style="width:42%"></span>
        </div>

        <div class="country">
          <span>Canada</span>
          <span>16%</span>
        </div>

        <div class="progress">
          <span style="width:16%"></span>
        </div>

        <div class="country">
          <span>Germany</span>
          <span>12%</span>
        </div>

        <div class="progress">
          <span style="width:12%"></span>
        </div>

        <div class="country">
          <span>Australia</span>
          <span>8%</span>
        </div>

        <div class="progress">
          <span style="width:8%"></span>
        </div>

        <div class="country">
          <span>Other</span>
          <span>20%</span>
        </div>

        <div class="progress">
          <span style="width:20%"></span>
        </div>

      </article>

    </section>

  </main>

</div>
